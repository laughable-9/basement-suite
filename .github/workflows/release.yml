# Release workflow.
#
# Fires only when a version tag like `v0.2.0` is pushed. Builds Basement
# Suite on Windows, macOS (Intel + Apple Silicon), and Linux, then attaches
# every installer to a single draft GitHub Release. The draft has to be
# edited and published manually so release notes and the version number
# get a human review before users see them.
#
# To cut a release: bump version in package.json + src-tauri/tauri.conf.json,
# commit, then `git tag v0.2.0 && git push origin v0.2.0`. ~10 minutes
# later the draft release appears at /releases.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    # Windows-only for now. Basement Suite is built for Repentance on
    # Windows; adding macOS / Linux means dealing with code-signing,
    # apt build deps, and AppImage glue we don't need for v0.1.x.
    runs-on: windows-latest
    env:
      # Opt the JavaScript actions (checkout, setup-node, etc.) into the
      # runner's Node 24 instead of the deprecated Node 20. Silences the
      # "Node.js 20 actions are deprecated" warning and stays compatible
      # when GitHub flips the default in June 2026.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install JS dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Basement Suite ${{ github.ref_name }}"
          releaseBody: |
            See the assets below to download.

            Replace this body with proper release notes before publishing.
          releaseDraft: true
          prerelease: false
